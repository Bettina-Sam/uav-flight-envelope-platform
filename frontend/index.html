<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F9FC" />
    <script>
      // Prevent a flash of light mode for users who previously chose dark.
      // Light is the default; this only acts when a stored preference says dark.
      try {
        if (localStorage.getItem('uav-envelope-theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
    <meta name="description" content="Physics-Informed Machine Learning Platform for UAV Flight Envelope Prediction and Altitude Optimization" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>UAV Flight Envelope Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
